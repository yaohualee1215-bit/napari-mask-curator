name: napari-mask-curator
display_name: Mask Curator
# use 'hidden' to remove plugin from napari hub search results
visibility: public
# see https://napari.org/stable/plugins/technical_references/manifest.html#fields for valid categories
# categories: []
contributions:
  commands:
    - id: napari-mask-curator.get_reader
      python_name: napari_mask_curator._reader:napari_get_reader
      title: Open data with Mask Curator
    - id: napari-mask-curator.write_multiple
      python_name: napari_mask_curator._writer:write_multiple
      title: Save multi-layer data with Mask Curator
    - id: napari-mask-curator.write_single_image
      python_name: napari_mask_curator._writer:write_single_image
      title: Save image data with Mask Curator
    - id: napari-mask-curator.make_sample_data
      python_name: napari_mask_curator._sample_data:make_sample_data
      title: Load sample data from Mask Curator
    - id: napari-mask-curator.make_container_widget
      python_name: napari_mask_curator:ImageThreshold
      title: Make threshold Container widget
    - id: napari-mask-curator.make_magic_widget
      python_name: napari_mask_curator:threshold_magic_widget
      title: Make threshold magic widget
    - id: napari-mask-curator.make_function_widget
      python_name: napari_mask_curator:threshold_autogenerate_widget
      title: Make threshold function widget
    - id: napari-mask-curator.make_qwidget
      python_name: napari_mask_curator:ExampleQWidget
      title: Make example QWidget
  readers:
    - command: napari-mask-curator.get_reader
      accepts_directories: false
      filename_patterns: ['*.npy']
  writers:
    - command: napari-mask-curator.write_multiple
      layer_types: ['image*','labels*']
      filename_extensions: []
    - command: napari-mask-curator.write_single_image
      layer_types: ['image']
      filename_extensions: ['.npy']
  sample_data:
    - command: napari-mask-curator.make_sample_data
      display_name: Mask Curator
      key: unique_id.1
  widgets:
    - command: napari-mask-curator.make_container_widget
      display_name: Container Threshold
    - command: napari-mask-curator.make_magic_widget
      display_name: Magic Threshold
    - command: napari-mask-curator.make_function_widget
      autogenerate: true
      display_name: Autogenerate Threshold
    - command: napari-mask-curator.make_qwidget
      display_name: Example QWidget
  menus:
    napari/layers/segment:
      - command: napari-mask-curator.make_container_widget
      - command: napari-mask-curator.make_magic_widget
      - command: napari-mask-curator.make_function_widget
      - command: napari-mask-curator.make_qwidget
